version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: tradesense-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: tradesense-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: tradesense
      CORS_ORIGINS: "*"
      # Set ONE of the following:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
    depends_on:
      - mongo
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        # For local access: http://localhost:8001
        # For LAN access: http://<your-machine-ip>:8001
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: tradesense-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
